# avizo configuration - macOS-style volume/brightness OSD
# https://github.com/misterio77/avizo

[default]
# Time to show the overlay (milliseconds)
time = 1000

# Width and height of the bar
width = 200
height = 200

# Padding around the bar
padding = 24

# Y offset from center (negative = up, positive = down)
y-offset = 0

# Fade in/out time (milliseconds)
fade-in = 100
fade-out = 100

# Image opacity (0-1)
image-opacity = 1.0

# Bar colors
bar-bg-color = rgba(30, 30, 30, 0.9)
bar-fg-color = rgba(255, 255, 255, 1.0)

# Background color
background = rgba(30, 30, 30, 0.9)

# Border
border-color = rgba(60, 60, 60, 0.9)
border-width = 0
border-radius = 20

# Icon colors
icon-color = rgba(255, 255, 255, 1.0)
