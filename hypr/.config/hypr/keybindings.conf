# Keybindings - see https://wiki.hyprland.org/Configuring/Keywords/
$mainMod = SUPER


# Window controls
bind = $mainMod, Q, exec, ghostty                           # Open terminal
bind = $mainMod, X, exec, ~/.config/hypr/scripts/kill_confirm.sh  # Close window with confirmation
bind = $mainMod, V, togglefloating                          # Toggle floating
bind = $mainMod, F, fullscreen                              # Toggle fullscreen
bind = $mainMod, P, pseudo                                  # Dwindle pseudotile
bind = $mainMod, M, togglesplit                             # Dwindle toggle split

# Alternative terminal (disabled)
# bind = $mainMod, Q, exec, alacritty


# Application launchers
bind = $mainMod, SPACE, exec, wofi                          # App launcher
bind = $mainMod, E, exec, thunar                           # File manager
bind = $mainMod, W, exec, brave-beta                       # Browser
bind = $mainMod, R, exec, obsidian --ozone-platform-hint=auto  # Obsidian

# System controls
bind = $mainMod, O, exec, swaylock                         # Lock screen
bind = $mainMod, U, exec, wlogout --protocol layer-shell    # Logout menu
bind = $mainMod SHIFT, M, exit                             # Exit Hyprland


# Window navigation (VIM style)

# Move focus
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d


# Workspace navigation

# Direct workspace access
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Relative workspace navigation
bind = $mainMod, D, workspace, r+1
bind = $mainMod, A, workspace, r-1
bind = $mainMod SHIFT, D, movetoworkspace, r+1
bind = $mainMod SHIFT, A, movetoworkspace, r-1

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace

# Hyprswitch - requires 'hyprswitch init' in autostart
# For v4.0.0: Run 'hyprswitch init --daemon' first
# bind = ALT, Tab, exec, hyprswitch simple --next
# bind = ALT SHIFT, Tab, exec, hyprswitch simple --prev

# Alt+Tab for workspace switching (Mac Mission Control style)
bind = ALT, Tab, workspace, r+1
bind = ALT SHIFT, Tab, workspace, r-1


# Quick launch shortcuts

# Web shortcuts
bind = CTRL SHIFT, B, exec, brave-beta --new-window https://www.bible.com/bible/111/MAT.1.NIV
bind = CTRL SHIFT ALT, E, exec, brave-beta --new-window https://chat.openai.com/
bind = CTRL SHIFT ALT, A, exec, brave-beta --new-window https://claude.ai/
bind = CTRL SHIFT ALT, L, exec, brave-beta --new-window https://linkedin.com/


# Utility bindings

# System utilities
bind = $mainMod SHIFT, B, exec, killall waybar && waybar   # Restart waybar
bind = $mainMod SHIFT, N, exec, swaync-client -t -sw       # Toggle notifications
bind = $mainMod SHIFT, C, exec, wl-color-picker clipboard --no-notify  # Color picker
bind = $mainMod SHIFT, E, exec, bemoji -t                  # Emoji picker
bind = $mainMod, period, exec, wofi-emoji                  # Emoji picker alternative

# Mouse pointer utilities
bind = $mainMod, Y, exec, wl-kbptr -o modes=floating,bisect -o mode_floating.source=detect
bind = $mainMod, T, exec, wl-kbptr

# Screenshot tools
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/screenshot_copy.sh
# bind = $mainMod SHIFT CTRL, S, exec, ~/.config/hypr/scripts/screenshot_save.sh

# Scripts
bind = $mainMod CTRL SHIFT, SPACE, exec, ~/.config/hypr/scripts/switch_layout.sh
bind = $mainMod CTRL SHIFT, 6, exec, ~/.config/hypr/scripts/switch_refreshrate.sh
bind = $mainMod CTRL SHIFT, 7, exec, ~/.config/hypr/scripts/speaker_toggle.sh
bind = $mainMod CTRL SHIFT, 0, exec, ~/.config/hypr/scripts/screen_manager.sh


# Special character input

# æøå for US keyboard layout
bind = $mainMod, bracketleft, exec, wtype "å"
bind = $mainMod, semicolon,   exec, wtype "ø"
bind = $mainMod, apostrophe,  exec, wtype "æ"

# Menu/Application key writes tilde
bind = ,135, exec, wtype "~"

# Special characters with Ctrl+Alt
bind = CTRL ALT, 2, exec, wtype @
bind = CTRL ALT, 3, exec, wtype £
bind = CTRL ALT, 4, exec, wtype $
bind = CTRL ALT, 7, exec, wtype {
bind = CTRL ALT, 8, exec, wtype [
bind = CTRL ALT, 9, exec, wtype ]
bind = CTRL ALT, 0, exec, wtype }


# Alternate modifier (MOD5) bindings

bind = MOD5, Q, exec, alacritty
bind = MOD5, O, exec, swaylock
bind = MOD5, E, exec, thunar
bind = MOD5, V, togglefloating
bind = MOD5, F, fullscreen
bind = MOD5, SPACE, exec, wofi
bind = MOD5, D, workspace, r+1
bind = MOD5, A, workspace, r-1


# ROG G15 Strix (2021) laptop bindings

# ASUS specific keys
bind = ,156, exec, rog-control-center                    # ASUS Armory crate
bind = ,211, exec, asusctl profile -n; pkill -SIGRTMIN+8 waybar  # Fan profile switch

# Audio controls
bind = ,121, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle           # FN+F1: Mute
bind = ,122, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%-     # FN+F2: Volume down
bind = ,123, exec, wpctl set-volume -l 1.0 @DEFAULT_AUDIO_SINK@ 5%+     # FN+F3: Volume up

# Brightness controls
bind = ,232, exec, brightnessctl set 1%-                 # FN+F7: Brightness down
bind = ,233, exec, brightnessctl set 1%+                 # FN+F8: Brightness up
bind = $mainMod, 232, exec, brightnessctl set 100%-      # Brightness 100% down
bind = $mainMod, 233, exec, brightnessctl set 50%+       # Brightness 50% up

# Keyboard controls
bind = ,237, exec, brightnessctl -d asus::kbd_backlight set 33%-  # FN+F2: KB brightness down
bind = ,238, exec, brightnessctl -d asus::kbd_backlight set 33%+  # FN+F3: KB brightness up
bind = ,210, exec, asusctl led-mode -n                   # FN+F4: RGB profile switch

# Screenshot key
bind = ,239, exec, ~/.config/hypr/scripts/screenshot_keycode.sh


# Mouse bindings

# Move/resize windows with mainMod + mouse buttons
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod SHIFT, mouse:272, resizewindow


# Plugins (disabled)

# bind = $mainMod, g, hyprexpo:expo, toggle
