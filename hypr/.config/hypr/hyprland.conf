#   ░░░▒▒▒░░░░░▓▓▓▓▓▓ 
#    ░░░▒▒░░░░▓▓   ▓▓ 
#     ░░░▒▒░░▓▓   ▓▓   
#       ░░▒▒▓▓   ▓▓ YPRLAND config


# Monitor setup - see https://wiki.hyprland.org/Configuring/Monitors/
monitor=DP-1,2560x1440@360, 0x0, 1.0, bitdepth, 10, cm, wide
monitor=DP-2,1920x1080@144, -1920x250, 1
monitor=DP-3,2560x1440@165, 2560x0, 1.0 
monitor=eDP-1,1920x1200@120, 0x0, 1.0
monitor=HDMI-A-1,highres, 0x0, 2.0, mirror, eDP-1

# Alternative monitor configs (disabled)
# monitor=DP-1,630x360@120, 0x0, 0.5
# monitor=eDP-1,1920x1080@120, 0x0, 1.0


# Autostart applications
exec-once = blueman-applet                    # Bluetooth tray icon
exec-once = nm-applet --no-agent --indicator  # Network tray icon
exec-once = sudo modprobe cp210x
exec-once = hyprpm reload -n
exec-once = iio-hyprland                      # Auto screen rotation
exec-once = swaync
exec-once = hyprpaper
exec-once = waybar
exec-once = hyprctl dispatch workspace 3
exec-once = hypridle
exec-once = mullvad-vpn                       # VPN on boot

# Optional autostart (disabled)
# exec-once = oguri
# exec-once = dwall -s beach
# exec-once = nwg-dock-hyprland -i 32 -nolauncher -l "top" -mb -49 -o eDP-1
# exec-once = hyprswitch init --daemon  # Mac-like Alt+Tab


# Environment variables
env = LIBVA_DRIVER_NAME,radeonsi  # AMD driver

# GTK Theme
env = GTK_THEME,Adwaita-dark
env = GTK_THEME,Orchis-Dark-Compact

# Scaling
env = GDK_SCALE,1
env = XCURSOR_SIZE,21
env = GDK_DPI_SCALE,1

# Qt apps (disabled)
# env = QT_QPA_PLATFORMTHEME,qt6ct
# env = QT_STYLE_OVERRIDE,Breeze

# XWayland scaling
xwayland {
    force_zero_scaling = true
}


# Input/keyboard/mouse
input {
    kb_layout = no  # Norwegian keyboard layout
    kb_model =
    kb_options = 
    kb_variant =
    kb_rules =
    
    follow_mouse = 1
    force_no_accel = 1
    sensitivity = -0.35
    
    touchpad {
        natural_scroll = yes
        disable_while_typing = no
        scroll_factor = 0.8
    }
    
    # Alternative keyboard options (disabled)
    # kb_options = caps:escape
    # kb_options = grp:lctrl_lalt_toggle
}

device {
    name = "elan1201:00-04f3:3098-touchpad"
    sensitivity = +0.1
}


# General settings
general {
    gaps_in = 4
    gaps_out = 7
    border_size = 3
    col.active_border = rgba(65b2ffff) 
    col.inactive_border = rgba(011423aa)
    layout = dwindle
    
    # Assign workspaces to monitors
    workspace = 1,  monitor:HDMI-A-1, persistent=true
    workspace = 2,  monitor:HDMI-A-1, persistent=true
    workspace = 3,  monitor:HDMI-A-1, persistent=true
    workspace = 4,  monitor:HDMI-A-1, persistent=true
    workspace = 5,  monitor:HDMI-A-1, persistent=true
    workspace = 6,  monitor:DP-1,     persistent=true
    workspace = 7,  monitor:DP-1,     persistent=true
    workspace = 8,  monitor:DP-1,     persistent=true
    workspace = 9,  monitor:DP-1,     persistent=true
    workspace = 10, monitor:DP-1,     persistent=true
    workspace = 11, monitor:DP-3,     persistent=true
    workspace = 12, monitor:DP-3,     persistent=true
    workspace = 13, monitor:DP-3,     persistent=true
    workspace = 14, monitor:DP-3,     persistent=true
    workspace = 15, monitor:DP-3,     persistent=true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    animate_manual_resizes = true
    vrr = 0
}

ecosystem:no_update_news = true


# Layout settings

dwindle {
    pseudotile = yes
    preserve_split = yes
}

master {
    # new_is_master = true
}

gestures {
    workspace_swipe_forever = true
    gesture = 3, horizontal, workspace
}


# Decoration - blur, shadows, etc
decoration {
    rounding = 14
    
    blur { 
        enabled = true
        size = 3
        passes = 4
        new_optimizations = yes
    }
    
    # Shadow settings (disabled)
    # drop_shadow = yes
    # shadow_range = 14
    
    # Layer rules (disabled)
    # layerrule = blur,waybar
    # layerrule = blur,wofi
}


# Import additional config files
source = ~/.config/hypr/animations.conf
source = ~/.config/hypr/keybindings.conf
source = ~/.config/hypr/windowrules.conf
source = ~/.config/hypr/hyprgrass.conf
source = ~/.config/hypr/hyprexpo.conf
