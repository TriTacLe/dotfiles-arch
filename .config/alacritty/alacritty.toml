# Alacritty TOML configuration for macOS (Retina, Mid 2015 MacBook Pro)
# Save to: ~/.config/alacritty/alacritty.toml

[window]
dynamic_title = true
startup_mode = "Windowed"
padding = { x = 10, y = 8 }
# opacity = 0.95   # optional — uncomment if supported by your Alacritty build

[font]
# Replace "SF Mono" with "Menlo", "Fira Code", "Iosevka", etc. as desired.
[font.normal]
family = "SF Mono"
style = "Regular"

[font.bold]
family = "SF Mono"
style = "Bold"

[font.italic]
family = "SF Mono"
style = "Italic"

font_size = 12.0
font_offset = { x = 0, y = 0 }
glyph_offset = { x = 0, y = 0 }
use_thin_strokes = true

[mouse]
double_click = { threshold = 300 }
triple_click = { threshold = 300 }
hide_when_typing = true
enabled = true

[selection]
semantic_escape_characters = " ,│()?[]{}'\"`-:;./\\"
save_to_clipboard = true

[scrolling]
history = 10000
multiplier = 3

[colors.primary]
background = "0x002b36"
foreground = "0x839496"

[colors.cursor]
text = "0x002b36"
cursor = "0xcb4b16"

[colors.normal]
black   = "0x073642"
red     = "0xdc322f"
green   = "0x859900"
yellow  = "0xb58900"
blue    = "0x268bd2"
magenta = "0xd33682"
cyan    = "0x2aa198"
white   = "0xeee8d5"

[colors.bright]
black   = "0x002b36"
red     = "0xcb4b16"
green   = "0x586e75"
yellow  = "0x657b83"
blue    = "0x839496"
magenta = "0x6c71c4"
cyan    = "0x93a1a1"
white   = "0xfdf6e3"


# Key bindings
key_bindings = [
  { key = "C", mods = "Command", action = "Copy" },
  { key = "V", mods = "Command", action = "Paste" },

  { key = "Equals", mods = "Command", action = "IncreaseFontSize" },
  { key = "Minus", mods = "Command", action = "DecreaseFontSize" },
  { key = "0", mods = "Command", action = "ResetFontSize" },

  { key = "N", mods = "Command", action = "SpawnNewInstance" },
  { key = "W", mods = "Command", action = "Quit" },

  { key = "F", mods = "Command", action = "Search" },
  { key = "Enter", mods = "Command", action = "ToggleFullscreen" },

  { key = "K", mods = "Command", action = "ClearHistory" }
]

[shell]
program = "/bin/zsh"
args = [ "--login" ]

[env]
LANG = "en_US.UTF-8"

live_config_reload = true

