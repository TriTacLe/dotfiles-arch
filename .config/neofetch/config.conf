# -------------------------
# General
# -------------------------
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="on"
memory_percent="on"
package_managers="on"
shell_version="on"
cpu_speed="on"
cpu_cores="logical"
gpu_type="all"
refresh_rate="on"

# -------------------------
# Output layout
# -------------------------
separator=" • "
gap=2
align="auto"

# What to show (order matters)
print_info() {
  info title
  info underline

  info "OS" distro
  info "Host" model
  info "Kernel" kernel
  info "Uptime" uptime
  info "Packages" packages
  info "Shell" shell
  info "Terminal" term
  info "WM" wm
  info "Theme" theme
  info "Icons" icons
  info "Font" font
  info "CPU" cpu
  info "GPU" gpu
  info "Memory" memory

  info cols
}

# -------------------------
# ASCII logo (Arch)
# -------------------------
ascii_distro="arch"
ascii_colors=(4 4 7 7 4 4)

# -------------------------
# Colors
# -------------------------
colors=(7 4 7 6 5 7)

# -------------------------
# Disable stuff you don’t want
# -------------------------
disk_show=()
music_player="off"
song_shorthand="off"
