print_info() {
  info title
  info underline

  prin ""
  prin "${c1}  ┌──────────────── System ────────────────┐${c0}"
  info "OS" distro
  info "Host" model
  info "Kernel" kernel
  info "Uptime" uptime
  info "Shell" shell
  info "Packages" packages
  prin "${c1}  └────────────────────────────────────────┘${c0}"

  prin ""
  prin "${c3}  ┌──────────────── Hardware ──────────────┐${c0}"
  info "CPU" cpu
  info "GPU" gpu
  info "Memory" memory
  info "Disk" disk
  info "Battery" battery
  prin "${c3}  └────────────────────────────────────────┘${c0}"

  # info line_break
  # info cols
}

show_os_architecture="on"
package_managers="on"

separator=" │"
bold="on"

underline_enabled="on"
underline_char="━"

gap=1
show_time="off"

title_color="1"
subtitle_color="3"
underline_color="1"
colon_color="8"
info_color="7"
info_sub_color="6"

image_backend="ascii"
image_source="$HOME/.config/neofetch/ascii1.txt"
ascii_distro="off"

ascii_colors=(1 3 3 1)

logo_padding=2

color_blocks="on"
color_block_range=(1 3)
color_block_width=3
color_block_height=1

bar_length=20
bar_char_elapsed="█"
bar_char_total="░"
bar_border="off"

bar_color_elapsed="1"
bar_color_total="8"
bar_color_border="7"

memory_percent="on"
memory_unit="gib"

disk_show=('/')
disk_total="on"
disk_used="on"
disk_percent="on"
disk_speed="off"

battery_percent="on"
battery_time="off"
battery_bar="on"

cpu_cores="logical"
cpu_speed="on"
cpu_temp="off"

public_ip_host="http://ident.me"
local_ip_interface="auto"

shell_version="on"
shell_path="off"
terminal_bold="on"
