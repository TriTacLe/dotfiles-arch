# wob configuration - macOS-style center overlay
# https://github.com/francma/wob

# Style
style = 

# Colors (using a nice blue like macOS)
border_color = 1E1E1E
background_color = 1E1E1E
bar_color = 0A84FF
overflow_border_color = 1E1E1E
overflow_background_color = 1E1E1E
overflow_bar_color = FF453A

# Dimensions
height = 24
width = 200
border_size = 1
border_offset = 4
bar_padding = 4

# Position (center of screen)
anchor = center
margin = 0

# Behavior
timeout = 1000

# Output mode (hide full, hide empty, show)
output_mode = hide-empty
