
# ================================
# Window / layout
# ================================
remember_window_size       yes
initial_window_width       110c
initial_window_height      32c

window_padding_width       18
window_margin_width        10
single_window_margin_width 0

draw_minimal_borders       yes
window_border_width        1
window_border_radius       12
placement_strategy         center
hide_window_decorations    titlebar-only

# ================================
# Background and image
# ================================
foreground                 #ffeafd
background                 #180a23

background_image           
background_image_layout    cscaled
background_image_linear    yes

background_opacity         0.83
dynamic_background_opacity yes
background_tint            0.50
background_tint_gaps       0.80

# ================================
# Cursor / selection
# ================================
cursor                     #ffb6e6
cursor_text_color          #180a23
cursor_shape               beam
cursor_beam_thickness      1.6
cursor_blink_interval      0.5
cursor_stop_blinking_after 0

selection_background       #ffe6ff
selection_foreground       #2c1637

# ================================
# Tab bar
# ================================
tab_bar_edge               bottom
tab_bar_min_tabs           1
tab_bar_style              powerline
tab_powerline_style        slanted
tab_bar_align              left

tab_bar_background         #241032
active_tab_foreground      #180a23
active_tab_background      #ffb6e6
inactive_tab_foreground    #fbeaff
inactive_tab_background    #3a1847

bell_on_tab                " 💖"
tab_activity_symbol        " ✧"
tab_title_template         "{activity_symbol}{index} ♡ {title}"

# ================================
# Borders
# ================================
active_border_color        #ffb6e6
inactive_border_color      #4a235a

# ================================
# Extra-cute pastel color palette
# ================================
color0   #241032
color1   #ff7aa2
color2   #a4ffd2
color3   #ffe8aa
color4   #b1c5ff
color5   #ffb6ff
color6   #aaf7ff
color7   #fbeaff

color8   #3e204d
color9   #ff93b5
color10  #bffff0
color11  #fff0c4
color12  #c5d0ff
color13  #ffc7ff
color14  #c8f8ff
color15  #fff1ff

# ================================
# macOS 
# ================================
macos_option_as_alt        no
macos_thicken_font         0.75

# ================================
# Behaviour / QoL
# ================================
copy_on_select             yes
strip_trailing_spaces      smart
scrollback_lines           10000

enable_audio_bell          no
window_alert_on_bell       yes

url_color                  #b1c5ff
open_url_with              default

# Dont asks for confirmation when OS/win mgr closes the window
confirm_os_window_close 0
